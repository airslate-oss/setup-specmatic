# CodeQL should scan our source, not the pre-bundled action runtime.
# dist/setup/index.js is a build artifact that inlines every transitive
# dependency (undici, etc.), and the scanner flags third-party code we
# don't author or control.
name: 'CodeQL config'

paths-ignore:
  - dist

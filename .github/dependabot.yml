version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    assignees: [cicdbot]
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    assignees: [cicdbot]
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github_actions
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
    ignore:
      # v4 is ESM-only and incompatible with @vercel/ncc CJS bundling.
      # We well update to v4 when we migrate to ESM and update our bundling strategy.
      - dependency-name: '@actions/http-client'
        update-types: ['version-update:semver-major']
